<!DOCTYPE html>
<html>
<head>
  <title>Ashapura Quick Print</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; text-align:center; }
    input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #25D366; color: white; border: none; font-size: 16px; }
  </style>
</head>
<body>

<h1>Ashapura Quick Print</h1>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="type">
  <option>Black & White</option>
  <option>Color</option>
</select>

<input id="copies" placeholder="Number of Copies">

<button onclick="sendOrder()">Place Order via WhatsApp</button>

<script>
function sendOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let type = document.getElementById("type").value;
  let copies = document.getElementById("copies").value;

  let message = `Hi, I want to place an order:%0AName: ${name}%0APhone: ${phone}%0AType: ${type}%0ACopies: ${copies}`;

  window.open(`https://wa.me/917426870575?text=${message}`, "_blank");
}
</script>

</body>
</html>
