<!DOCTYPE html>
<html>
<head>
  <title>Ashapura Quick Print</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f2f6ff;
      padding: 20px;
    }
    .card {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    .whatsapp {
      background: #25D366;
      color: white;
    }
    .upload {
      background: #007bff;
      color: white;
    }
    .price {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="card">
<h1>Ashapura Quick Print</h1>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="type">
  <option value="2">Black & White (₹2/page)</option>
  <option value="10">Color (₹10/page)</option>
</select>

<input id="copies" type="number" placeholder="Number of Pages">

<select id="binding">
  <option>No Binding</option>
  <option>Spiral Binding (+₹20)</option>
  <option>Lamination (+₹10)</option>
</select>

<textarea id="notes" placeholder="Any extra instructions"></textarea>

<div class="price" id="priceBox">Estimated Price: ₹0</div>

<!-- 🔵 FILE UPLOAD BUTTON -->
<a href="PASTE_YOUR_GOOGLE_FORM_LINK_HERE" target="_blank">
  <button class="upload">Upload File for Printing</button>
</a>

<!-- 🟢 WHATSAPP ORDER BUTTON -->
<button class="whatsapp" onclick="sendOrder()">Place Order on WhatsApp</button>

</div>

<script>
function calculatePrice() {
  let pricePerPage = document.getElementById("type").value;
  let pages = document.getElementById("copies").value || 0;
  let total = pricePerPage * pages;

  let binding = document.getElementById("binding").value;
  if (binding.includes("20")) total += 20;
  if (binding.includes("10")) total += 10;

  document.getElementById("priceBox").innerText = "Estimated Price: ₹" + total;
}

document.getElementById("type").addEventListener("change", calculatePrice);
document.getElementById("copies").addEventListener("input", calculatePrice);
document.getElementById("binding").addEventListener("change", calculatePrice);

function sendOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let type = document.getElementById("type").selectedOptions[0].text;
  let pages = document.getElementById("copies").value;
  let binding = document.getElementById("binding").value;
  let notes = document.getElementById("notes").value;
  let price = document.getElementById("priceBox").innerText;

  let message = `Hi, I want to place an order:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Type: ${type}%0A
Pages: ${pages}%0A
Binding: ${binding}%0A
${price}%0A
Notes: ${notes}`;

  window.open(`https://wa.me/917426870575?text=${message}`, "_blank");
}
</script>

</body>
</html>
